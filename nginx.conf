worker_processes  auto;
events { worker_connections 1024; }

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # ── gzip ──
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── log to stdout/stderr (12-factor / Docker friendly) ──
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  _;

        root  /usr/share/nginx/html;
        index index.html;

        # ── security headers ──
        add_header X-Frame-Options          "SAMEORIGIN"               always;
        add_header X-Content-Type-Options   "nosniff"                  always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
        # Cloudflare terminates TLS upstream — HSTS still safe to send
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── static assets: long cache, immutable ──
        location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico|woff2?|ttf|otf|eot|css|js|map)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            access_log off;
            try_files $uri =404;
        }

        # ── HTML: short cache, must-revalidate (so deploys propagate fast) ──
        location = / { try_files /index.html =404; }
        location / {
            add_header Cache-Control "public, max-age=300, must-revalidate";
            try_files $uri $uri/ /index.html;
        }

        # ── healthcheck ──
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ── deny dotfiles ──
        location ~ /\.(?!well-known) { deny all; }
    }
}
