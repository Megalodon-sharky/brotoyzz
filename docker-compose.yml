services:
  web:
    build: .
    image: brotoyzz-landing:latest
    container_name: brotoyzz-landing
    restart: unless-stopped
    ports:
      # host:container — change host port if 80 is taken
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # uncomment to attach a Cloudflare Tunnel sidecar (see README §3b)
    # networks: [edge]
    # labels:
    #   - "traefik.enable=true"

# networks:
#   edge:
#     external: true
